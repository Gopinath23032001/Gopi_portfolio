<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page not found — Gopinath Arumugam</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme")
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches
          document.documentElement.setAttribute("data-theme", stored || (prefersDark ? "dark" : "light"))
        } catch (e) {}
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/main.css" />
  </head>
  <body>
    <main class="container" style="min-height: 70vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 1rem">
      <span class="eyebrow">404</span>
      <h1 style="font-size: clamp(2rem, 6vw, 3rem)">Page not found</h1>
      <p style="color: var(--muted); max-width: 28rem">
        The page you're looking for doesn't exist or may have moved.
      </p>
      <a href="/" class="btn btn-primary">Back to home</a>
    </main>
  </body>
</html>
